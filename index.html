                        ipcRenderer.send('open-url', 'https://calendar.google.com');
                        return true;
                        
                    case 'office365':
                    case 'office':
                        ipcRenderer.send('open-url', 'https://www.office.com');
                        return true;
                        
                    case 'bluetooth':
                        ipcRenderer.send('open-windows-app', 'ms-settings:bluetooth');
                        return true;
                        
                    case 'explorador':
                    case 'explorador de ficheiros':
                    case 'file explorer':
                        ipcRenderer.send('open-windows-app', 'explorer');
                        return true;
                }
            } catch (error) {
                console.log('Erro ao abrir aplicativo:', error);
                showMessage('Não consegui abrir o aplicativo. Tente manualmente 😿');
                return false;
            }
            return false;
        }

        // ========== FUNÇÕES DE DESENHO DO GATO ==========
        function drawCat() {
            ctx.clearRect(0, 0, CONFIG.CANVAS_SIZE, CONFIG.CANVAS_SIZE);
            
            const isBlinking = state.blinkTimer > 0;
            const tailWag = !state.isIdle && !state.isSleeping && !state.isFalling && !state.isSitting && (state.frame % 8 < 4);
            const walkAnimation = state.frame % 16;

            if (state.isDragging) {
                drawDraggedCat();
            } else if (state.isSleeping) {
                drawSleepingCat();
            } else if (state.isFalling) {
                drawFallingCat();
            } else if (state.isSitting) {
                drawSittingCat(isBlinking);
            } else if (state.isTalking) {
                drawTalkingCat(isBlinking, tailWag, walkAnimation);
            } else {
                drawWalkingCat(isBlinking, tailWag, walkAnimation);
            }
        }

        function drawWalkingCat(isBlinking, tailWag, walkStep) {
            drawCatBase(isBlinking, tailWag, walkStep, false);
        }

        function drawTalkingCat(isBlinking, tailWag, walkStep) {
            drawCatBase(isBlinking, tailWag, walkStep, true);
        }

        function drawDraggedCat() {
            const f = state.frame;
            const bob  = Math.sin(f * 0.6) * 2;   // corpo a balançar
            const hb   = Math.sin(f * 0.7) * 1.5; // cabeça a balançar
            const pw   = f * 0.9;                  // velocidade das patas

            // Gato inteiro ligeiramente a oscilar
            ctx.save();
            ctx.translate(20, 20);
            ctx.rotate(Math.sin(f * 0.4) * 0.1);
            ctx.translate(-20, -20);

            // Cauda a abanar muito (susto/animado)
            const tw = Math.sin(f * 0.5) * 7;
            ctx.fillStyle = COLORS.black;
            ctx.beginPath();
            ctx.moveTo(28, 22 + bob);
            ctx.bezierCurveTo(34 + tw, 15, 36 + tw, 9, 38, 5 + tw);
            ctx.bezierCurveTo(36 + tw, 13, 32 + tw, 20, 28, 22 + bob);
            ctx.fill();

            // Corpo
            ctx.fillStyle = COLORS.black;
            ctx.beginPath();
            ctx.ellipse(20, 24 + bob, 12, 8, 0, 0, 2 * Math.PI);
            ctx.fill();

            // Cabeça
            ctx.beginPath();
            ctx.arc(20, 12 + hb, 9, 0, 2 * Math.PI);
            ctx.fill();

            // Orelhas levantadas (susto)
            ctx.beginPath();
            ctx.moveTo(12, 3 + hb); ctx.lineTo(16, 10 + hb); ctx.lineTo(10, 10 + hb);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(28, 3 + hb); ctx.lineTo(24, 10 + hb); ctx.lineTo(30, 10 + hb);
            ctx.fill();
            ctx.fillStyle = COLORS.dark_gray;
            ctx.beginPath();
            ctx.moveTo(13, 4 + hb); ctx.lineTo(15, 9 + hb); ctx.lineTo(11, 9 + hb);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(27, 4 + hb); ctx.lineTo(25, 9 + hb); ctx.lineTo(29, 9 + hb);
            ctx.fill();

            // Olhos arregalados de susto
            ctx.fillStyle = COLORS.eye_green;
            ctx.beginPath();
            ctx.ellipse(17, 11 + hb, 3, 3.5, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(23, 11 + hb, 3, 3.5, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = COLORS.eye_highlight;
            ctx.fillRect(16, 10 + hb, 1, 1);
            ctx.fillRect(22, 10 + hb, 1, 1);
            // Pupilas contraídas (medo)
            ctx.fillStyle = '#000000';
            ctx.fillRect(17, 11 + hb, 1, 1);
            ctx.fillRect(23, 11 + hb, 1, 1);

            // Nariz
            ctx.fillStyle = COLORS.nose;
            ctx.beginPath();
            ctx.moveTo(19, 14 + hb);
            ctx.lineTo(21, 14 + hb);
            ctx.lineTo(20, 16 + hb);
            ctx.fill();

            // Boca aberta de susto com linguinha
            ctx.fillStyle = COLORS.tongue;
            ctx.beginPath();
            ctx.ellipse(20, 19 + hb, 2, 1.5, 0, 0, Math.PI);
            ctx.fill();
            ctx.strokeStyle = COLORS.dark_gray;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(20, 18 + hb, 2, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // Bigodes a tremer
            ctx.strokeStyle = COLORS.medium_gray;
            ctx.lineWidth = 1;
            const ww = Math.sin(f * 1.5) * 1.2;
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(12, 13 + hb + i * 2);
                ctx.lineTo(6 + ww, 11 + hb + i * 1.5);
                ctx.stroke();
            }
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(28, 13 + hb + i * 2);
                ctx.lineTo(34 - ww, 11 + hb + i * 1.5);
                ctx.stroke();
            }

            // Pata dianteira esquerda — abana para cima/baixo
            ctx.save();
            ctx.translate(15, 28 + bob);
            ctx.rotate(Math.sin(pw) * 0.6);
            ctx.fillStyle = COLORS.black;
            ctx.fillRect(-1, 0, 3, 6);
            ctx.fillStyle = COLORS.dark_gray;
            ctx.fillRect(-1, 4, 3, 2);
            ctx.restore();

            // Pata dianteira direita — desfasada 180°
            ctx.save();
            ctx.translate(25, 28 + bob);
            ctx.rotate(Math.sin(pw + Math.PI) * 0.6);
            ctx.fillStyle = COLORS.black;
            ctx.fillRect(-1, 0, 3, 6);
            ctx.fillStyle = COLORS.dark_gray;
            ctx.fillRect(-1, 4, 3, 2);
            ctx.restore();

            // Pata traseira esquerda — balança menos
            ctx.save();
            ctx.translate(17, 30 + bob);
            ctx.rotate(Math.sin(pw * 0.7) * 0.35);
            ctx.fillStyle = COLORS.black;
            ctx.fillRect(-1, 0, 3, 8);
            ctx.fillStyle = COLORS.dark_gray;
            ctx.fillRect(-1, 6, 3, 2);
            ctx.restore();

            // Pata traseira direita — desfasada
            ctx.save();
            ctx.translate(23, 30 + bob);
            ctx.rotate(Math.sin(pw * 0.7 + Math.PI) * 0.35);
            ctx.fillStyle = COLORS.black;
            ctx.fillRect(-1, 0, 3, 8);
            ctx.fillStyle = COLORS.dark_gray;
            ctx.fillRect(-1, 6, 3, 2);
            ctx.restore();

            ctx.restore(); // rotação geral
        }

        function drawCatBase(isBlinking, tailWag, walkStep, isTalking) {
            ctx.fillStyle = COLORS.black;
            
            const bodyBob = Math.sin(state.frame * 0.3) * 1;
            ctx.beginPath();
            ctx.ellipse(20, 24 + bodyBob, 12, 8, 0, 0, 2 * Math.PI);
            ctx.fill();
            
            const headBob = Math.sin(state.frame * 0.4) * 0.5;
            ctx.beginPath();
            ctx.arc(20, 12 + headBob, 9, 0, 2 * Math.PI);
            ctx.fill();
            
            // Orelhas
            ctx.beginPath();
            ctx.moveTo(13, 5 + headBob);
            ctx.lineTo(17, 10 + headBob);
            ctx.lineTo(11, 10 + headBob);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(27, 5 + headBob);
            ctx.lineTo(23, 10 + headBob);
            ctx.lineTo(29, 10 + headBob);
            ctx.fill();
            
            // Orelhas internas
            ctx.fillStyle = COLORS.dark_gray;
            ctx.beginPath();
            ctx.moveTo(14, 6 + headBob);
            ctx.lineTo(16, 9 + headBob);
            ctx.lineTo(12, 9 + headBob);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(26, 6 + headBob);
            ctx.lineTo(24, 9 + headBob);
            ctx.lineTo(28, 9 + headBob);
            ctx.fill();
            
            // Olhos
            if (!isBlinking) {
                ctx.fillStyle = COLORS.eye_green;
                ctx.beginPath();
                ctx.ellipse(17, 11 + headBob, 2.5, 3, 0, 0, 2 * Math.PI);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(23, 11 + headBob, 2.5, 3, 0, 0, 2 * Math.PI);
                ctx.fill();
                
                // Brilho nos olhos
                ctx.fillStyle = COLORS.eye_highlight;
                ctx.fillRect(16, 10 + headBob, 1, 1);
                ctx.fillRect(22, 10 + headBob, 1, 1);
                
                // Pupilas
                ctx.fillStyle = '#000000';
                ctx.fillRect(16, 11 + headBob, 1, 2);
                ctx.fillRect(22, 11 + headBob, 1, 2);
            } else {
                // Pálpebras fechadas
                ctx.fillStyle = COLORS.black;
                ctx.fillRect(15, 11 + headBob, 4, 1);
                ctx.fillRect(21, 11 + headBob, 4, 1);
            }
            
            // Nariz
            ctx.fillStyle = COLORS.nose;
            ctx.beginPath();
            ctx.moveTo(19, 14 + headBob);
            ctx.lineTo(21, 14 + headBob);
            ctx.lineTo(20, 16 + headBob);
            ctx.fill();
            
            // Boca
            if (isTalking) {
                drawTalkingMouth(20, 17 + headBob);
            } else {
                drawNormalMouth(20, 17 + headBob);
            }
            
            // Bigodes
            ctx.strokeStyle = COLORS.medium_gray;
            ctx.lineWidth = 1;
            const whiskerWave = Math.sin(state.frame * 0.5) * 0.3;
            
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(12, 13 + headBob + i * 2);
                ctx.lineTo(8 + whiskerWave, 12 + i * 1.5);
                ctx.stroke();
            }
            
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(28, 13 + headBob + i * 2);
                ctx.lineTo(32 - whiskerWave, 12 + i * 1.5);
                ctx.stroke();
            }
            
            // Patas
            ctx.fillStyle = COLORS.black;
            const legLift = Math.abs(Math.sin(walkStep * 0.4)) * 3;
            
            if (walkStep < 8) {
                drawPaw(15, 30 + legLift, false, walkStep);
                drawPaw(25, 32, false, walkStep);
            } else {
                drawPaw(15, 32, false, walkStep);
                drawPaw(25, 30 + legLift, false, walkStep);
            }
            
            drawPaw(18, 32, true, walkStep);
            drawPaw(22, 32, true, walkStep);
            
            // Cauda
            ctx.fillStyle = COLORS.black;
            const tailWave = Math.sin(state.frame * 0.2) * 3;
            if (tailWag) {
                ctx.beginPath();
                ctx.moveTo(28, 22);
                ctx.bezierCurveTo(32 + tailWave, 18, 34 + tailWave, 15, 36, 12 + tailWave);
                ctx.bezierCurveTo(34 + tailWave, 20, 30 + tailWave, 22, 28, 22);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.moveTo(28, 22);
                ctx.bezierCurveTo(32, 18, 34, 15, 36, 12);
                ctx.bezierCurveTo(34, 20, 30, 22, 28, 22);
                ctx.fill();
            }
        }

        function drawNormalMouth(x, y) {
            ctx.strokeStyle = COLORS.dark_gray;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(x, y, 2, 0.2, Math.PI - 0.2);
            ctx.stroke();
        }

        function drawTalkingMouth(x, y) {
            const mouthState = state.mouthFrame % 4;
            
            ctx.fillStyle = COLORS.tongue;
            
            if (mouthState === 0 || mouthState === 2) {
                ctx.beginPath();
                ctx.ellipse(x, y + 1, 2.5, 1.5, 0, 0, Math.PI);
                ctx.fill();
                
                ctx.fillStyle = COLORS.mouth;
                ctx.fillRect(x - 1, y + 0.5, 2, 1);
            } else if (mouthState === 1) {
                ctx.beginPath();
                ctx.ellipse(x, y + 0.5, 2, 1, 0, 0, Math.PI);
                ctx.fill();
                
                ctx.fillStyle = COLORS.mouth;
                ctx.fillRect(x - 0.5, y, 1, 1);
            } else {
                ctx.beginPath();
                ctx.ellipse(x, y, 1.5, 0.5, 0, 0, Math.PI);
                ctx.fill();
            }
            
            ctx.strokeStyle = COLORS.dark_gray;
            ctx.lineWidth = 1;
            ctx.beginPath();
            
            if (mouthState === 0 || mouthState === 2) {
                ctx.arc(x, y + 1, 2.5, 0.1, Math.PI - 0.1);
            } else if (mouthState === 1) {
                ctx.arc(x, y + 0.5, 2, 0.15, Math.PI - 0.15);
            } else {
                ctx.arc(x, y, 1.5, 0.2, Math.PI - 0.2);
            }
            ctx.stroke();
        }

        function drawPaw(x, y, isHind, step) {
            ctx.fillStyle = COLORS.black;
            const pawBob = Math.sin(step * 0.5) * 1;
            
            ctx.fillRect(x - 1, y + pawBob, 3, isHind ? 8 : 6);
            
            ctx.fillStyle = COLORS.dark_gray;
            ctx.fillRect(x - 1, y + pawBob + (isHind ? 6 : 4), 3, 2);
        }

        function drawSleepingCat() {
            ctx.fillStyle = COLORS.black;
            
            ctx.beginPath();
            ctx.ellipse(20, 25, 14, 6, 0, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(14, 22, 7, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(11, 18);
            ctx.lineTo(14, 22);
            ctx.lineTo(9, 22);
            ctx.fill();
            
            ctx.fillStyle = COLORS.black;
            ctx.fillRect(12, 21, 3, 1);
            ctx.fillRect(15, 21, 3, 1);
            
            ctx.strokeStyle = COLORS.dark_gray;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(14, 24, 1, 0.1, Math.PI - 0.1);
            ctx.stroke();
            
            ctx.fillStyle = COLORS.zzz_yellow;
            const zOffset = (state.frame % 30) / 10;
            
            ctx.save();
            ctx.translate(22, 18 - zOffset);
            ctx.rotate(Math.sin(state.frame * 0.1) * 0.1);
            ctx.fillRect(0, 0, 4, 1);
            ctx.fillRect(0, 2, 4, 1);
            ctx.fillRect(3, 1, 1, 1);
            ctx.restore();
            
            ctx.save();
            ctx.translate(26, 17 - zOffset);
            ctx.rotate(Math.sin(state.frame * 0.1 + 1) * 0.1);
            ctx.fillRect(0, 0, 4, 1);
            ctx.fillRect(0, 2, 4, 1);
            ctx.fillRect(3, 1, 1, 1);
            ctx.restore();
            
            ctx.save();
            ctx.translate(30, 16 - zOffset);
            ctx.rotate(Math.sin(state.frame * 0.1 + 2) * 0.1);
            ctx.fillRect(0, 0, 4, 1);
            ctx.fillRect(0, 2, 4, 1);
            ctx.fillRect(3, 1, 1, 1);
            ctx.restore();
            
            ctx.fillStyle = COLORS.black;
            ctx.fillRect(16, 28, 3, 4);
            ctx.fillRect(21, 28, 3, 4);
        }

        function drawFallingCat() {
            ctx.fillStyle = COLORS.black;
            
            const fallProgress = state.fallTimer / CONFIG.FALL_ANIMATION_DURATION;
            const stretch = 1 + fallProgress * 0.5;
            
            ctx.beginPath();
            ctx.ellipse(20, 24, 12 * stretch, 8 / stretch, Math.PI/4 * fallProgress, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(20, 12, 9, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(12, 6);
            ctx.lineTo(15, 10);
            ctx.lineTo(10, 10);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(28, 6);
            ctx.lineTo(25, 10);
            ctx.lineTo(30, 10);
            ctx.fill();
            
            ctx.fillStyle = COLORS.eye_green;
            ctx.beginPath();
            ctx.ellipse(17, 11, 3, 3.5, 0, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.ellipse(23, 11, 3, 3.5, 0, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(16, 11, 2, 2);
            ctx.fillRect(22, 11, 2, 2);
            
            ctx.fillStyle = COLORS.tongue;
            ctx.beginPath();
            ctx.ellipse(20, 16, 3, 2, 0, 0, Math.PI);
            ctx.fill();
            
            ctx.fillStyle = COLORS.mouth;
            ctx.fillRect(18, 15, 4, 1);
            
            ctx.strokeStyle = COLORS.dark_gray;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(20, 16, 3, 0.1, Math.PI - 0.1);
            ctx.stroke();
            
            const pawSpread = fallProgress * 3;
            ctx.fillStyle = COLORS.black;
            
            ctx.fillRect(15 - pawSpread, 28, 3, 6);
            ctx.fillRect(22 + pawSpread, 28, 3, 6);
            
            ctx.fillRect(17, 30, 3, 8);
            ctx.fillRect(20, 30, 3, 8);
            
            ctx.beginPath();
            ctx.moveTo(28, 22);
            ctx.bezierCurveTo(32, 15, 34, 10, 36, 5);
            ctx.bezierCurveTo(34, 15, 30, 20, 28, 22);
            ctx.fill();
            
            if (fallProgress > 0.3) {
                ctx.strokeStyle = COLORS.white;
                ctx.lineWidth = 1;
                for (let i = 0; i < 3; i++) {
                    const windOffset = (state.frame + i * 10) % 20;
                    ctx.beginPath();
                    ctx.moveTo(5, 15 + i * 5);
                    ctx.lineTo(10 + windOffset, 12 + i * 5);
                    ctx.stroke();
                }
            }
        }

        function drawSittingCat(isBlinking) {
            ctx.fillStyle = COLORS.black;
            ctx.beginPath();
            ctx.ellipse(20, 25, 10, 6, 0, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(20, 15, 8, 0, 2 * Math.PI);
            ctx.fill();
            
            if (!isBlinking) {
                ctx.fillStyle = COLORS.eye_green;
                ctx.beginPath();
                ctx.ellipse(17, 14, 2, 2.5, 0, 0, 2 * Math.PI);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(23, 14, 2, 2.5, 0, 0, 2 * Math.PI);
                ctx.fill();
            }
            
            drawNormalMouth(20, 17);
            
            ctx.fillStyle = COLORS.black;
            ctx.fillRect(18, 28, 4, 4);
            ctx.fillRect(22, 28, 4, 4);
        }

        // ========== FUNÇÕES PRINCIPAIS ==========
        function showMessage(text = null) {
            if (state.isSleeping || state.isFalling) return;
            
            if (!text) {
                text = MOTIVATIONAL_MESSAGES[Math.floor(Math.random() * MOTIVATIONAL_MESSAGES.length)];
            }
            
            state.isTalking = true;
            state.talkTimer = 0;
            state.mouthFrame = 0;
            
            bubble.textContent = text;
            bubble.classList.add('show');
            
            if (state.mouthAnimation) {
                clearInterval(state.mouthAnimation);
            }
            
            state.mouthAnimation = setInterval(() => {
                state.mouthFrame++;
            }, CONFIG.MOUTH_SPEED);
            
            setTimeout(() => {
                stopTalking();
                bubble.classList.remove('show');
            }, CONFIG.TALK_DURATION);
        }

        function stopTalking() {
            state.isTalking = false;
            state.talkTimer = 0;
            if (state.mouthAnimation) {
                clearInterval(state.mouthAnimation);
                state.mouthAnimation = null;
            }
        }

        // ========== FÍSICA E MOVIMENTO DO GATO ==========
        function updatePhysics(deltaTime) {
            const floor = window.innerHeight - CONFIG.PET_SIZE;
            state.isOnFloor = state.posY >= floor - 1;
            
            state.velocityY += CONFIG.GRAVITY * deltaTime;
            state.posY += state.velocityY * deltaTime;
            
            if (state.posY > floor) {
                state.posY = floor;
                state.velocityY = 0;
                state.isOnFloor = true;
                
                if (state.isFalling) {
                    state.isFalling = false;
                    state.fallTimer = 0;
                    showMessage('Ufa! Cai de pé como um gato! 😼');
                }
            }
            
            if (!state.isDragging && !state.isSleeping && !state.isFalling) {
                state.posX += state.velocityX * deltaTime;
                
                // Limites da tela
                state.posX = Math.max(0, Math.min(state.posX, window.innerWidth - CONFIG.PET_SIZE));
                state.posY = Math.max(0, Math.min(state.posY, window.innerHeight - CONFIG.PET_SIZE));
                
                if (state.posX <= 0) {
                    state.posX = 0;
                    state.velocityX = Math.abs(state.velocityX);
                }
                if (state.posX + CONFIG.PET_SIZE >= window.innerWidth) {
                    state.posX = window.innerWidth - CONFIG.PET_SIZE;
                    state.velocityX = -Math.abs(state.velocityX);
                }
            }
        }

        // ========== SISTEMA DE ANIMAÇÃO ==========
        function updateAnimation() {
            state.frame++;
            
            if (state.blinkCooldown <= 0 && Math.random() < 0.002) {
                state.blinkTimer = 8;
                state.blinkCooldown = CONFIG.BLINK_INTERVAL / 16.67;
            }
            
            if (state.blinkTimer > 0) state.blinkTimer--;
            if (state.blinkCooldown > 0) state.blinkCooldown--;
            
            if (state.isFalling) {
                state.fallTimer += 16.67;
                if (state.fallTimer > CONFIG.FALL_ANIMATION_DURATION) {
                    state.isFalling = false;
                    state.fallTimer = 0;
                }
            }
            
            if (state.isSleeping) {
                state.sleepTimer++;
                if (state.sleepTimer > 900 + Math.random() * 600) {
                    state.isSleeping = false;
                    state.sleepTimer = 0;
                    showMessage('Hmm? Já estou acordado! 🌞');
                }
            }
            
            if (state.isTalking) {
                state.talkTimer++;
                if (state.talkTimer > CONFIG.TALK_DURATION / 16.67) {
                    stopTalking();
                }
            }
            
            if (!state.isSleeping && !state.isFalling && !state.isDragging && state.isOnFloor) {
                if (Math.random() < CONFIG.SLEEP_CHANCE) {
                    state.isSleeping = true;
                    state.sleepTimer = 0;
                    showMessage('Zzz... Hora da soneca... 😴');
                }
            }
        }

        // ========== RENDERIZAÇÃO ==========
        function render() {
            drawCat();
            pet.style.left = Math.round(state.posX) + 'px';
            pet.style.top = Math.round(state.posY) + 'px';
        }

        // ========== LOOP PRINCIPAL ==========
        function gameLoop(currentTime) {
            const deltaTime = Math.min(0.04, (currentTime - state.lastTime) / 1000);
            state.lastTime = currentTime;
            
            updatePhysics(deltaTime);
            updateAnimation();
            render();
            
            requestAnimationFrame(gameLoop);
        }

        // ========== FUNÇÃO DE EXECUTAR COMANDOS ==========
        function executePetCommand(cmd) {
            console.log("Comando recebido:", cmd);
            
            const command = cmd.toLowerCase().trim();
            
            // Comandos de ajuda
            if (command === "ajuda" || command === "comandos") {
                showCommandsTable();
                showMessage("Aqui estão todos os comandos disponíveis! 📋😺");
                return;
            }

            // ── TEMPO ──────────────────────────────────────────────

            // Comando marcar evento
            if (command.startsWith("marcar evento") || command.startsWith("criar evento") || command.startsWith("novo evento")) {
                const { ipcRenderer } = require('electron');

                const dateMatch = command.match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
                const timeMatch = command.match(/(\d{1,2}):(\d{2})/);

                if (!dateMatch) {
                    showMessage("Indica a data! Ex: marcar evento Reunião 15/03 14:30 📅");
                    return;
                }
                if (!timeMatch) {
                    showMessage("Indica a hora! Ex: marcar evento Reunião 15/03 14:30 🕐");
                    return;
                }

                const day    = parseInt(dateMatch[1]);
                const month  = parseInt(dateMatch[2]);
                const yearRaw = dateMatch[3];
                const year   = yearRaw
                    ? (yearRaw.length === 2 ? 2000 + parseInt(yearRaw) : parseInt(yearRaw))
                    : new Date().getFullYear();
                const hour   = parseInt(timeMatch[1]);
                const min    = parseInt(timeMatch[2]);

                if (day < 1 || day > 31)    { showMessage("Dia inválido! 😿"); return; }
                if (month < 1 || month > 12) { showMessage("Mês inválido! 😿"); return; }
                if (hour < 0 || hour > 23)  { showMessage("Hora inválida! 😿"); return; }
                if (min  < 0 || min  > 59)  { showMessage("Minutos inválidos! 😿"); return; }

                const prefix = command.match(/^(marcar|criar|novo) evento\s*/i);
                let titulo = command
                    .slice(prefix ? prefix[0].length : 0)
                    .replace(/\d{1,2}\/\d{1,2}(?:\/\d{2,4})?/, '')
                    .replace(/\d{1,2}:\d{2}/, '')
                    .replace(/\s+/g, ' ').trim();
                if (!titulo) titulo = 'Evento';

                const pad     = n => String(n).padStart(2, '0');
                const startdt = `${year}-${pad(month)}-${pad(day)}T${pad(hour)}:${pad(min)}:00`;
                const endHour = (hour + 1) < 24 ? hour + 1 : hour;
                const enddt   = `${year}-${pad(month)}-${pad(day)}T${pad(endHour)}:${pad(min)}:00`;

                ipcRenderer.invoke('create-calendar-event', { titulo, startdt, enddt });
                showMessage(`Google Calendar aberto! Clica Guardar no browser 📅`);
                return;

            // Comando fechar aplicativo (app aberto mais recentemente)

                                : "Não consegui fechar nenhum 😿");

                            if (r && r.success) fechados++;
                            i++;

                        });

            // Comandos fechar [aplicacao]

            // Diagnóstico do calendário

        // ========== EVENT LISTENERS ==========
        petCommand.addEventListener("keydown", (e) => {

        // Arrastar gato

        pet.addEventListener('mousedown', (e) => {

            state.isDragging = true;

        document.addEventListener('mousemove', (e) => {

                state.posX = e.clientX - dragOffsetX;
                state.posY = e.clientY - dragOffsetY;
                
                state.posX = Math.max(0, Math.min(state.posX, window.innerWidth - CONFIG.PET_SIZE));
                state.posY = Math.max(0, Math.min(state.posY, window.innerHeight - CONFIG.PET_SIZE));
            }
            
            if (commandState.isDragging) {
                let newX = e.clientX - commandState.dragOffsetX;
                let newY = e.clientY - commandState.dragOffsetY;

                const containerHeight = commandContainer.offsetHeight;

        // Arrastar campo de comando pelo handle
        dragHandle.addEventListener('mousedown', (e) => {

        // ========== INICIALIZAÇÃO ==========
        function init() {
            pet.style.width = CONFIG.PET_SIZE + 'px';
            pet.style.height = CONFIG.PET_SIZE + 'px';
            canvas.width = CONFIG.CANVAS_SIZE;
            canvas.height = CONFIG.CANVAS_SIZE;

            requestAnimationFrame(gameLoop);

        // ── CONTROLO DO RATO ─────────────────────────────────────────
        // ── Passthrough: verifica TODOS os elementos interativos ──
        const ipc = require('electron').ipcRenderer;
        let overInteractive = false;

        function isOverEl(e, el) {
            if (!el) return false;
            const r = el.getBoundingClientRect();
            return e.clientX >= r.left && e.clientX <= r.right &&
                   e.clientY >= r.top  && e.clientY <= r.bottom;
        }

        document.addEventListener('mousemove', (e) => {
            const nowOver = (
                isOverEl(e, pet) ||
                isOverEl(e, commandContainer) ||
                isOverEl(e, commandsTable) ||
                isOverEl(e, showCommandsBtn) ||
                isOverEl(e, toggleVisibilityBtn) ||
                isOverEl(e, document.getElementById('infoPanel'))
            );
            if (nowOver !== overInteractive) {
                overInteractive = nowOver;
                if (!state.isDragging) ipc.send('set-mouse-passthrough', !nowOver);
            }
        });

        // ═══════════════════════════════════════════════════════════
        // PAINEL DE INFORMAÇÃO
        // ═══════════════════════════════════════════════════════════
        const infoPanel      = document.getElementById('infoPanel');
        const infoPanelTitle     = document.getElementById('infoPanelTitle');
        const infoPanelBody      = document.getElementById('infoPanelBody');
        const infoPanelClose     = document.getElementById('infoPanelClose');
        const infoPanelRefresh   = document.getElementById('infoPanelRefresh');
        const infoPanelCountdown = document.getElementById('infoPanelCountdown');

        // Estado do auto-refresh
        let activeMode      = null;   // 'tempo' | 'bolsa' | 'noticias'
        let refreshInterval = null;   // setInterval do refresh automático
        let countdownInterval = null; // setInterval do contador visual
        let nextRefreshAt   = 0;      // timestamp da próxima atualização

        // Intervalos de atualização automática
        const REFRESH_INTERVALS = {
            tempo:    10 * 60 * 1000,  // 10 minutos
            bolsa:     1 * 60 * 1000,  // 1 minuto
            noticias: 15 * 60 * 1000,  // 15 minutos
        };

        function clearAutoRefresh() {
            if (refreshInterval)  clearInterval(refreshInterval);
            if (countdownInterval) clearInterval(countdownInterval);
            refreshInterval = null;
            countdownInterval = null;
            infoPanelCountdown.textContent = '';
        }

        function startAutoRefresh(mode, fetchFn) {
            clearAutoRefresh();
            activeMode = mode;
            const interval = REFRESH_INTERVALS[mode];
            nextRefreshAt = Date.now() + interval;

            // Atualização automática
            refreshInterval = setInterval(() => {
                if (infoPanel.classList.contains('show')) {
                    fetchFn();
                    nextRefreshAt = Date.now() + interval;
                }
            }, interval);

            // Contador visual no header
            countdownInterval = setInterval(() => {
                const secsLeft = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
                if (secsLeft < 60) {
                    infoPanelCountdown.textContent = `↻ ${secsLeft}s`;
                } else {
                    const mins = Math.floor(secsLeft / 60);
                    const secs = secsLeft % 60;
                    infoPanelCountdown.textContent = `↻ ${mins}m${secs > 0 ? secs + 's' : ''}`;
                }
            }, 1000);
        }

        infoPanelClose.addEventListener('click', () => {
            infoPanel.classList.remove('show');
            clearAutoRefresh();
            activeMode = null;
        });

        infoPanelRefresh.addEventListener('click', () => {
            if (!activeMode) return;
            // Animação de rotação
            infoPanelRefresh.classList.add('spinning');
            setTimeout(() => infoPanelRefresh.classList.remove('spinning'), 600);
            // Reiniciar o contador
            nextRefreshAt = Date.now() + REFRESH_INTERVALS[activeMode];
            // Chamar a função correta
            if (activeMode === 'tempo')    fetchTempo(false);
            if (activeMode === 'bolsa')    fetchBolsa(false);
            if (activeMode === 'noticias') fetchNoticias(false);
        });

        function showInfoPanel(title, html) {
            infoPanelTitle.textContent = title;
            infoPanelBody.innerHTML = html;
            infoPanel.classList.add('show');
            ipc.send('set-mouse-passthrough', false);
        }

        function infoLoading(title) {
            showInfoPanel(title, '<div class="info-loading">⏳ A carregar...</div>');
        }

        function infoError(title, msg) {
            showInfoPanel(title, `<div class="info-error">❌ ${msg}</div>`);
        }

        // ── TEMPO ──────────────────────────────────────────────────
        async function fetchTempo(showLoading = true) {
            if (showLoading) infoLoading('☁️ Tempo em Lisboa');
            startAutoRefresh('tempo', () => fetchTempo(false));
            try {
                // Open-Meteo — Lisboa: lat 38.717, lon -9.142
                const url = 'https://api.open-meteo.com/v1/forecast' +
                    '?latitude=38.717&longitude=-9.142' +
                    '&current=temperature_2m,apparent_temperature,relative_humidity_2m,' +
                    'precipitation,wind_speed_10m,wind_direction_10m,weathercode' +
                    '&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode' +
                    '&timezone=Europe%2FLisbon&forecast_days=4';

                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const d = await res.json();
                const c = d.current;

                const WMO = {
                    0:'☀️ Céu limpo', 1:'🌤️ Pouco nublado', 2:'⛅ Parcialmente nublado',
                    3:'☁️ Nublado', 45:'🌫️ Nevoeiro', 48:'🌫️ Nevoeiro com gelo',
                    51:'🌦️ Chuvisco leve', 53:'🌦️ Chuvisco', 55:'🌧️ Chuvisco forte',
                    61:'🌧️ Chuva fraca', 63:'🌧️ Chuva moderada', 65:'🌧️ Chuva forte',
                    71:'❄️ Neve fraca', 73:'❄️ Neve', 75:'❄️ Neve forte',
                    80:'🌦️ Aguaceiros', 81:'🌦️ Aguaceiros moderados', 82:'⛈️ Aguaceiros fortes',
                    95:'⛈️ Trovoada', 96:'⛈️ Trovoada com granizo', 99:'⛈️ Trovoada forte'
                };

                const cond = WMO[c.weathercode] || '🌡️ Condição desconhecida';
                const windDir = ['N','NE','E','SE','S','SO','O','NO'][Math.round(c.wind_direction_10m / 45) % 8];

                // Previsão 4 dias
                const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
                let forecastHTML = '';
                for (let i = 0; i < 4; i++) {
                    const dt  = new Date(d.daily.time[i]);
                    const dia = i === 0 ? 'Hoje' : i === 1 ? 'Amanhã' : dias[dt.getDay()];
                    const dc  = WMO[d.daily.weathercode[i]]?.split(' ').slice(0,1).join('') || '🌡️';
                    forecastHTML += `<div class="info-row">
                        <span class="info-label">${dia}</span>
                        <span>${dc} ${d.daily.temperature_2m_min[i].toFixed(0)}° / <b>${d.daily.temperature_2m_max[i].toFixed(0)}°C</b></span>
                    </div>`;
                }

                showInfoPanel('☁️ Tempo em Lisboa', `
                    <div class="info-row">
                        <span class="info-label">Condição</span>
                        <span class="info-value">${cond}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Temperatura</span>
                        <span class="info-value">${c.temperature_2m.toFixed(1)}°C</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Sensação</span>
                        <span class="info-value">${c.apparent_temperature.toFixed(1)}°C</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Humidade</span>
                        <span class="info-value">${c.relative_humidity_2m}%</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Vento</span>
                        <span class="info-value">${c.wind_speed_10m.toFixed(1)} km/h ${windDir}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Precipitação</span>
                        <span class="info-value">${c.precipitation} mm</span>
                    </div>
                    <div class="info-section-title">📅 Próximos dias</div>
                    ${forecastHTML}
                `);
                showMessage(`${cond} · ${c.temperature_2m.toFixed(0)}°C em Lisboa 🌡️`);
            } catch(err) {
                infoError('☁️ Tempo em Lisboa', `Não consegui obter o tempo.<br><small>${err.message}</small>`);
                showMessage("Não consegui obter o tempo 😿");
            }
        }

        // ── BOLSA ──────────────────────────────────────────────────
        // API: Yahoo Finance (sem chave necessária)
        async function fetchBolsa(showLoading = true) {
            if (showLoading) infoLoading('📈 Mercados');
            startAutoRefresh('bolsa', () => fetchBolsa(false));
            const ativos = [
                { sym: 'BTC-USD',  nome: '₿ Bitcoin',     tipo: 'cripto' },
                { sym: 'ETH-USD',  nome: '⟠ Ethereum',    tipo: 'cripto' },
                { sym: '^GSPC',    nome: '📊 S&P 500',     tipo: 'index'  },
                { sym: '^IXIC',    nome: '📊 NASDAQ',      tipo: 'index'  },
                { sym: 'EURUSD=X', nome: '💶 EUR/USD',     tipo: 'forex'  },
                { sym: 'GC=F',     nome: '🥇 Ouro',        tipo: 'commod' },
            ];

            try {
                const resultados = await Promise.all(ativos.map(async (a) => {
                    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(a.sym)}?interval=1d&range=2d`;
                    const r = await fetch(url);
                    if (!r.ok) throw new Error(`HTTP ${r.status} para ${a.sym}`);
                    const j = await r.json();
                    const meta  = j.chart.result[0].meta;
                    const price = meta.regularMarketPrice;
                    const prev  = meta.chartPreviousClose || meta.previousClose;
                    const pct   = prev ? ((price - prev) / prev * 100) : 0;
                    const up    = pct >= 0;

                    // Formatar valor
                    let valor;
                    if (a.tipo === 'cripto') valor = price.toLocaleString('pt-PT', {minimumFractionDigits:0, maximumFractionDigits:0}) + ' $';
                    else if (a.tipo === 'forex') valor = price.toFixed(4);
                    else if (a.tipo === 'commod') valor = price.toLocaleString('pt-PT', {minimumFractionDigits:0, maximumFractionDigits:0}) + ' $';
                    else valor = price.toLocaleString('pt-PT', {minimumFractionDigits:0, maximumFractionDigits:0});

                    return { ...a, valor, pct, up };
                }));

                const rows = resultados.map(r => `
                    <div class="info-row">
                        <span class="info-label">${r.nome}</span>
                        <span>
                            <span class="info-value">${r.valor}</span>
                            <span class="${r.up ? 'info-up' : 'info-down'}" style="margin-left:6px;font-size:11px">
                                ${r.up ? '▲' : '▼'} ${Math.abs(r.pct).toFixed(2)}%
                            </span>
                        </span>
                    </div>`).join('');

                const btc = resultados[0];
                showInfoPanel('📈 Mercados', rows);
                showMessage(`BTC ${btc.valor} ${btc.up ? '▲' : '▼'}${Math.abs(btc.pct).toFixed(2)}% 📈`);
            } catch(err) {
                infoError('📈 Mercados', `Não consegui obter cotações.<br><small>${err.message}</small>`);
                showMessage("Não consegui obter a bolsa 😿");
            }
        }

        // ── NOTÍCIAS ───────────────────────────────────────────────
        // RSS feeds PT — fetch direto (Electron não tem restrições CORS)
        async function fetchNoticias(showLoading = true) {
            if (showLoading) infoLoading('📰 Notícias');
            startAutoRefresh('noticias', () => fetchNoticias(false));

            // Múltiplos feeds por ordem de preferência
            const feeds = [
                { url: 'https://feeds.feedburner.com/sapo-noticias',      nome: 'SAPO Notícias' },
                { url: 'https://www.dn.pt/arc/outboundfeeds/rss/',         nome: 'Diário de Notícias' },
                { url: 'https://rss.rtp.pt/www/?rss=noticias',             nome: 'RTP Notícias' },
                { url: 'https://www.publico.pt/api/rss',                   nome: 'Público' },
                { url: 'https://feeds.bbci.co.uk/portuguese/rss.xml',      nome: 'BBC Portugal' },
                { url: 'https://www.jn.pt/arc/outboundfeeds/rss/',         nome: 'Jornal de Notícias' },
                { url: 'https://observador.pt/feed/',                      nome: 'Observador' },
            ];

            for (const feed of feeds) {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 7000);

                    // Fetch direto — Electron não precisa de proxy CORS
                    const res = await fetch(feed.url, {
                        signal: controller.signal,
                        headers: { 'Accept': 'application/rss+xml, application/xml, text/xml, */*' }
                    });
                    clearTimeout(timeout);

                    if (!res.ok) continue;

                    const text = await res.text();
                    if (!text || text.length < 200) continue;

                    const parser = new DOMParser();
                    const doc    = parser.parseFromString(text, 'text/xml');

                    // Verificar se o XML parseou corretamente
                    const parseError = doc.querySelector('parsererror');
                    if (parseError) continue;

                    const items = Array.from(doc.querySelectorAll('item')).slice(0, 8);
                    if (items.length === 0) continue;

                    const html = items.map(item => {
                        // Título — limpar CDATA e entidades HTML
                        let title = item.querySelector('title')?.textContent?.trim() || '';
                        title = title
                            .replace(/<!\[CDATA\[|\]\]>/g, '')
                            .replace(/&amp;/g, '&')
                            .replace(/&lt;/g, '<')
                            .replace(/&gt;/g, '>')
                            .replace(/&quot;/g, '"')
                            .replace(/&#39;/g, "'")
                            .trim();
                        if (!title) return '';
                        return `<div class="news-item">
                            <div class="news-title">${title}</div>
                            <div class="news-src">${feed.nome}</div>
                        </div>`;
                    }).filter(Boolean).join('');

                    if (!html) continue;

                    showInfoPanel('📰 Notícias', html);
                    showMessage(`${items.length} notícias do ${feed.nome} 📰`);
                    return; // sucesso

                } catch(e) {
                    // timeout ou erro de rede — tentar próximo
                    continue;
                }
            }

            // Nenhum feed funcionou
            infoError('📰 Notícias', 'Não foi possível carregar notícias.<br><small>Verifica a ligação à internet.</small>');
            showMessage("Não consegui carregar notícias 😿");
        }

    </script>
